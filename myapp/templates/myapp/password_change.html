{% load static %}


{% block extra_css %}
<link rel="stylesheet" href="{% static 'myapp/passwordchange.css' %}"> 
{% endblock %}

{% block content %}
<div class="container">
  <h2>Change Your Password</h2>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Change Password</button>
    <a href="{% url 'dashboard_view' %}" class="back-to-dashboard">Go to Dashboard</a>
  </form>
</div>
{% endblock %}
