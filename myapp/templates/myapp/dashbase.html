<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="SCOPE INDIA, IT Training, Software Courses, Contact, Technopark, Trivandrum, Kochi, Nagercoil">
  <meta name="author" content="SCOPE INDIA">
  <meta property="og:title" content="Contact Us - SCOPE INDIA">
  <meta property="og:description" content="Reach out to SCOPE INDIA for IT courses, job-oriented programs and tech education.">
  <meta property="og:image" content="{% static 'myapp/scope-india-logo-bird.png' %}">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">

    <title>{% block title %}dashbase{% endblock %}</title>
    <!-- <link rel="stylesheet" href="{% static 'myapp/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'myapp/footer.css' %}"> -->
    <link rel="stylesheet" href="{% static 'myapp/scrolltop.css' %}">
   
    {% block extra_css %} {% endblock %}
    <!-- Bootstrap CSS -->
<!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
<!-- Bootstrap JS + Popper -->
<!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
    
    <style>
.dashboard-container {
  background-image:url('{% static "myapp/Cool-Robot-Wallpaper.jpg" %}'); 
  background-repeat: no-repeat;
  background-size: cover;
}

  



</style>
</head>
<body>
   
   <main>
    {% block content %} {% endblock %}
   </main>
   <button onClick="scrollToTop()" id="scrollTopBtn" title="Go to top">
    <img src="{% static 'myapp/arrow-up-button-green-top.png' %}" alt="Up" />
   </button>   
    <script>
  // Show button when user scrolls down
  window.onscroll = function() {
    const btn = document.getElementById("scrollTopBtn");
    if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
      btn.style.display = "block";
    } else {
      btn.style.display = "none";
    }
  };

  // Scroll to top smoothly
  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
   
</body>
</html>
